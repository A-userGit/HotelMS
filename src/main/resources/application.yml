server:
  port: 8092
spring:
  application:
    name: hotel-ms
    port: 8092
  liquibase:
    enabled: true
    drop-first: false
    change-log: classpath:db/changelog-master.yaml
    default-schema: public
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show-sql: true
swagger-server: http://localhost:8092/